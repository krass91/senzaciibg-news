<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenzaciiBG - Новини</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #e60000; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--primary); }
        .hero-news { position: relative; height: 450px; background: var(--dark); overflow: hidden; }
        .hero-news img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        .category-tag { background: var(--primary); color: white; padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .news-card { transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .news-card img { height: 200px; object-fit: cover; }
        .sidebar-section { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; }
        footer { background: var(--dark); color: white; padding: 2rem 0; }
        .page-item.active .page-link { background-color: var(--primary); border-color: var(--primary); }
        .page-link { color: var(--dark); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-newspaper"></i> SenzaciiBG</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Начало</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showAllNews()">Всички</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="filterNews('politics')">Политика</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="filterNews('sports')">Спорт</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="filterNews('business')">Бизнес</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="filterNews('tech')">Технологии</a></li>
                </ul>
                <a href="admin.html" class="btn btn-light btn-sm" style="display:none;"><i class="fas fa-cog"></i> Admin</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8">
                <h3 class="mb-4 border-bottom pb-2" id="pageTitle"><i class="fas fa-clock"></i> Последни новини</h3>
                <div class="row" id="newsGrid"></div>
                <nav aria-label="Page navigation" class="mt-4"><ul class="pagination justify-content-center" id="pagination"></ul></nav>
            </div>
            <div class="col-lg-4">
                <div class="sidebar-section">
                    <h5><i class="fas fa-fire text-danger"></i> Най-четени</h5>
                    <div id="popularNews"></div>
                </div>
                <div class="sidebar-section">
                    <h5><i class="fas fa-tags"></i> Категории</h5>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="badge bg-secondary" onclick="filterNews('politics')">Политика</span>
                        <span class="badge bg-secondary" onclick="filterNews('sports')">Спорт</span>
                        <span class="badge bg-secondary" onclick="filterNews('business')">Бизнес</span>
                        <span class="badge bg-secondary" onclick="filterNews('tech')">Технологии</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p>© 2026 SenzaciiBG. Всички права запазени.</p>
            <p><small>Сайтът е създаден с OpenClaw + Codex</small></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const allNews = [
            { id: 1, title: 'Андрей Янкулов: Подготвяме предложение за дисциплинарно производство срещу Русинова', category: 'politics', excerpt: 'Правосъдният министър обяви в ефир на предаването "Твоят ден", че се подготвя предложение за дисциплинарно производство.', image: 'https://picsum.photos/800/500?random=201', date: '03.04.2026', views: 1850 },
            { id: 2, title: 'Хиновски: Повишението на парното е абсурд, "Топлофикация София" е във фалит', category: 'business', excerpt: 'Адекватният процент за повишение на топлинната енергия заради цената на газа е не повече от 7-8 процента, подчерта експертът.', image: 'https://picsum.photos/800/500?random=202', date: '03.04.2026', views: 1420 },
            { id: 3, title: 'Морето изхвърли крило на боен дрон на плаж в Бургаско', category: 'politics', excerpt: 'Крайбрежната охрана не е открила детонатор или взривно устройство на плажа край Бургас.', image: 'https://picsum.photos/800/500?random=203', date: '03.04.2026', views: 2340 },
            { id: 4, title: 'Пътнически влак дерайлира в Старозагорско (СНИМКИ)', category: 'politics', excerpt: 'В композицията е имало 11 пътници, инцидентът е станал рано тази сутрин.', image: 'https://picsum.photos/800/500?random=204', date: '03.04.2026', views: 1680 },
            { id: 5, title: 'София отбелязва 147 години като столица с богата празнична програма', category: 'politics', excerpt: 'Тазгодишната програма включва изложби, концерти, творчески инициативи и тематични пешеходни турове из столицата.', image: 'https://picsum.photos/800/500?random=205', date: '03.04.2026', views: 980 },
            { id: 6, title: 'Людмила Елкова: Дефицитът расте бързо и няма изгледи да спре', category: 'business', excerpt: '„Разходите нарастват по-бързо от икономиката и създават риск за бюджета", подчерта доц. Красен Станчев.', image: 'https://picsum.photos/800/500?random=206', date: '03.04.2026', views: 1150 },
            { id: 7, title: 'Язовир „Александър Стамболийски" прелива след поройните дъждове', category: 'politics', excerpt: 'Нивото на язовир „Йовковци" също се е покачило значително след обилните валежи.', image: 'https://picsum.photos/800/500?random=207', date: '03.04.2026', views: 890 },
            { id: 8, title: 'Критичен риск от лавини в планините', category: 'tech', excerpt: 'СКИорите и туристите да не излизат извън пистите, предупреждават специалистите от Планинската спасителна служба.', image: 'https://picsum.photos/800/500?random=208', date: '03.04.2026', views: 720 },
            { id: 9, title: 'Ботев Пловдив обяви новия си треньор след победата за Купата', category: 'sports', excerpt: '„Ботев" Пловдив обяви кой ще води отбора през новия сезон след историческата победа.', image: 'https://picsum.photos/800/500?random=209', date: '03.04.2026', views: 1560 },
            { id: 10, title: 'Григор Димитров с нова победа на Мастърс в Маями', category: 'sports', excerpt: 'Българският тенисист продължава впечатляващата си форма с убедителна победа на полуфинала.', image: 'https://picsum.photos/800/500?random=210', date: '03.04.2026', views: 2100 }
        ];

        const ITEMS_PER_PAGE = 20;
        let currentPage = 1;
        let filteredNews = [...allNews];

        function getCategoryName(cat) {
            const names = { politics: 'Политика', sports: 'Спорт', business: 'Бизнес', tech: 'Технологии' };
            return names[cat] || cat;
        }

        function renderNews(page) {
            const start = (page - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageNews = filteredNews.slice(start, end);
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = pageNews.map(n => `
                <div class="col-md-6 mb-4">
                    <div class="card news-card h-100" onclick="viewNews(${n.id})">
                        <img src="${n.image}" class="card-img-top" alt="${n.title}">
                        <div class="card-body">
                            <span class="category-tag">${getCategoryName(n.category)}</span>
                            <h5 class="card-title mt-2 fw-bold">${n.title}</h5>
                            <p class="card-text text-muted small">${n.excerpt}</p>
                            <small class="text-muted"><i class="far fa-calendar"></i> ${n.date}</small>
                        </div>
                    </div>
                </div>
            `).join('');
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredNews.length / ITEMS_PER_PAGE);
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = '';
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">&laquo;</a></li>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">&raquo;</a></li>`;
            pagination.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredNews.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderNews(page);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterNews(category) {
            filteredNews = allNews.filter(n => n.category === category);
            currentPage = 1;
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-tag"></i> ' + getCategoryName(category);
            renderNews(1);
        }

        function showAllNews() {
            filteredNews = [...allNews];
            currentPage = 1;
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-clock"></i> Всички новини (' + allNews.length + ')';
            renderNews(1);
        }

        function loadPopular() {
            const sorted = [...allNews].sort((a, b) => b.views - a.views).slice(0, 5);
            document.getElementById('popularNews').innerHTML = sorted.map(n => `
                <div class="border-bottom py-2" style="cursor:pointer" onclick="viewNews(${n.id})">
                    <small class="text-danger fw-bold">${getCategoryName(n.category)}</small>
                    <p class="mb-0 small fw-medium">${n.title}</p>
                </div>
            `).join('');
        }

        function viewNews(id) {
            window.location.href = 'article.html?id=' + id;
        }

        function init() {
            filteredNews = [...allNews];
            document.getElementById('pageTitle').innerHTML = '<i class="fas fa-clock"></i> Всички новини (' + allNews.length + ')';
            renderNews(1);
            loadPopular();
        }

        init();
    </script>
</body>
</html>
